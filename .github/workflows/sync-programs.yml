name: Sync programów z jw.org

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pobierz aktualne programy
        run: node scripts/sync-programs.mjs

      - name: Zacommituj zmiany (jeśli są)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/programs
          git diff --staged --quiet || git commit -m "chore: sync programów z jw.org"
          git push
